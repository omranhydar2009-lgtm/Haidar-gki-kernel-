name: 🚀 GKI_BUILD_STRICT_TAG_METHOD
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: 👨‍🔧 Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libncurses5-dev x11proto-core-dev libxml2-utils xsltproc unzip python3 bc llvm lld clang lz4 repo
          curl https://raw.githubusercontent.com/akhilnarang/scripts/master/setup/android_build_env.sh | bash -

      - name: 📥 Clone Kernel Source (Strict Tag)
        run: |
          # سحب سورس النواة من الرابط الذي أرسلته مباشرة باستخدام التاج المحدد
          git clone --branch android15-6.6-2025-02_r1 https://android.googlesource.com/kernel/common --depth=1 common

      - name: ⏳ Sync Build Tools (Minimal)
        run: |
          # بما أن النواة وحدها لا تكفي، نحتاج أدوات Bazel/Kleaf من المانيفست الرسمي
          # سنستخدم repo هنا فقط لجلب المترجمات والأدوات (Prebuilts)
          repo init -u https://android.googlesource.com/kernel/manifest -b android15-6.6 --depth=1
          
          # استثناء مجلد common من الـ sync لأننا سحبناه يدوياً بـ git clone
          # نقوم بسحب مجلدات الأدوات والبناء فقط
          repo sync -c -j$(nproc) build tools prebuilts --no-clone-bundle

      - name: 🔨 Build Kernel (Modern Bazel)
        run: |
          # تهيئة بيئة بناء Kleaf الخاصة بأندرويد 15
          mkdir -p external/bazelbuild-rules_shell
          chmod +x tools/bazel
          chmod +x build/bazel.sh
          
          # تنفيذ أمر البناء الرسمي (يعادل أمر build.sh في الفيديو)
          LTO=thin ./tools/bazel build --config=fast //common:kernel_aarch64_dist

      - name: 📦 Export Image
        run: |
          mkdir -p output
          # النسخ من مسار المخرجات الخاص بنواة 6.6
          cp out/android15-6.6/dist/Image ./output/Image || cp out/common/dist/Image ./output/Image

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GKI-6.6-StrictTag-Result
          path: output/Image
