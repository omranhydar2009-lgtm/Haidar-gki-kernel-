name: 🚀 Phase-3-vmos0-Reverse-Method
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Free Disk Space"
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: "👨‍🔧 Setup Build Environment"
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libncurses5-dev x11proto-core-dev libxml2-utils xsltproc unzip python3 bc llvm lld clang lz4 repo
          curl https://raw.githubusercontent.com/akhilnarang/scripts/master/setup/android_build_env.sh | bash -

      - name: "⏳ Accurate Sync (vmos0 Strategy)"
        run: |
          mkdir kernel && cd kernel
          repo init -u https://github.com/xprateek/kernel_manifest -b common-android15-6.6 --depth=1
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune
          chmod +x tools/bazel || true
          chmod +x build/build.sh || true

      - name: "🔨 Build GKI (vmos0 Style)"
        working-directory: kernel
        run: |
          ./tools/bazel build --config=fast //common:kernel_aarch64_dist

      - name: "📦 Export Image"
        run: |
          mkdir -p output
          find kernel/out/ -name Image -exec cp {} ./output/Image \;
          if [ ! -f ./output/Image ]; then
             find . -name Image -exec cp {} ./output/Image \;
          fi

      - name: "📤 Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: GKI-vmos0-Method
          path: output/Image
