name: HP Driver Upload to Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Download HP Driver
        run: |
          python -c "
          import requests
          target_url = 'https://ftp.hp.com/pub/softpaq/sp151001-151500/sp151198.exe'
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
          }
          with requests.get(target_url, stream=True, headers=headers) as r:
              if r.status_code == 200:
                  with open('hp-driver.exe', 'wb') as f:
                      for chunk in r.iter_content(chunk_size=8192):
                          f.write(chunk)
              else:
                  print(f'Error: {r.status_code}')
                  exit(1)
          "

      - name: Verify Size
        run: |
          FILE_SIZE=$(stat -c%s "hp-driver.exe")
          if [ $FILE_SIZE -lt 1000000 ]; then
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: HP-SP151198
          name: "HP Driver SoftPaq SP151198"
          body: "Automated upload of HP Driver from official FTP."
          files: hp-driver.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
