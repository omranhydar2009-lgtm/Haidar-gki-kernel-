name: MediaFire to Release
on: 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Download File using Script
        run: |
          python -c "
          import requests
          from bs4 import BeautifulSoup
          import os

          url = 'https://www.mediafire.com/file/asll6cafzoyn3kp/All+Bosses+Abilities+by+Nintendo+OG.zip/file'
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'}
          
          response = requests.get(url, headers=headers)
          soup = BeautifulSoup(response.text, 'html.parser')
          download_button = soup.find('a', {'id': 'downloadButton'})
          
          if download_button:
              direct_link = download_button.get('href')
              with requests.get(direct_link, stream=True, headers=headers) as r:
                  r.raise_for_status()
                  with open('game.zip', 'wb') as f:
                      for chunk in r.iter_content(chunk_size=8192):
                          f.write(chunk)
          else:
              exit(1)
          "

      - name: Unzip and Process
        run: |
          mkdir -p extracted
          unzip -o game.zip -d extracted
          APK_PATH=$(find extracted -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            exit 1
          fi
          mv "$APK_PATH" ./final_game.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release APK - Build ${{ github.run_number }}"
          files: final_game.apk
          body: "Auto-extracted APK from MediaFire."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
