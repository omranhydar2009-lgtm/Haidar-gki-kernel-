name: 🏗️ GKI_BUILD_STRICT_VIDEO_BRANCH
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: 👨‍🔧 Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libncurses5-dev x11proto-core-dev libxml2-utils xsltproc unzip python3 bc llvm lld clang lz4 repo
          curl https://raw.githubusercontent.com/akhilnarang/scripts/master/setup/android_build_env.sh | bash -

      - name: ⏳ Repo Init & Sync (Exact Branch)
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android15-6.6-2025-02 --depth=1 --partial-clone --clone-bundle=n
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle
          mkdir -p external/bazelbuild-rules_shell
          chmod +x tools/bazel
          chmod +x build/bazel.sh

      - name: 🔨 Build Kernel (Using LTO=thin)
        working-directory: kernel_workspace
        run: |
          LTO=thin ./tools/bazel build --config=fast //common:kernel_aarch64_dist

      - name: 📦 Export Image
        run: |
          mkdir -p output
          cp kernel_workspace/out/android15-6.6/dist/Image ./output/Image || cp kernel_workspace/out/common/dist/Image ./output/Image

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GKI-6.6.66-Video-Branch-Result
          path: output/Image
