name: Remote APK Extractor with Size Check
on: 
  workflow_dispatch:

jobs:
  extract_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Advanced Download
        run: |
          LINK=$(curl -s "https://download2388.mediafire.com/pe8k29n9uh4gj1ETbwC_ddDCkalRKlUP7QUS5sah5dMkR-DvqmTzQGD9ZdUmCJYWsaUNt8VUu5wAK4ZaGpWZ9jMih_SqMH25hKtfBQjWXBa0KlLpQuS_yM_en7T9qu-3cZXdNL3aYfT4WqdOYpUo-5Ib8IZuMfBUj9kmiOy-qLfXqA/asll6cafzoyn3kp/All+Bosses+Abilities+by+Nintendo+OG.zip" | grep -o 'https://download[^"]*' | head -n 1)
          
          if [ -z "$LINK" ]; then
            LINK="https://download2388.mediafire.com/pe8k29n9uh4gj1ETbwC_ddDCkalRKlUP7QUS5sah5dMkR-DvqmTzQGD9ZdUmCJYWsaUNt8VUu5wAK4ZaGpWZ9jMih_SqMH25hKtfBQjWXBa0KlLpQuS_yM_en7T9qu-3cZXdNL3aYfT4WqdOYpUo-5Ib8IZuMfBUj9kmiOy-qLfXqA/asll6cafzoyn3kp/All+Bosses+Abilities+by+Nintendo+OG.zip"
          fi
          
          wget --user-agent="Mozilla/5.0" "$LINK" -O game.zip

      - name: Check File Size
        run: |
          ls -lh game.zip
          FILE_SIZE=$(stat -c%s game.zip)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "Error: Download failed or file too small."
            exit 1
          fi

      - name: Unzip and List Files
        run: |
          mkdir -p extracted
          unzip -o game.zip -d extracted
          find extracted -maxdepth 3

      - name: Find and Rename APK
        run: |
          APK_PATH=$(find extracted -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK found."
            exit 1
          fi
          mv "$APK_PATH" ./final_game.apk

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Extracted-APK
          path: final_game.apk
