name: Build ReSukiSU Kernel LI9 (GKI 6.6-2025-02)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Install Build Tools
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libncurses5-dev x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc unzip python3 bc

      - name: Sync Kernel Source
        run: |
          # Use the specific tag you provided
          git clone --depth 1 -b android15-6.6-2025-02_r1 https://android.googlesource.com/kernel/common common
          
      - name: Integrate ReSukiSU and SUSFS
        run: |
          cd common
          # Install ReSukiSU via official setup script
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          
          # Clone and copy SUSFS files
          git clone https://gitlab.com/simonpunk/susfs4ksu -b gki-android15-6.6 ../susfs
          cp ../susfs/include/linux/susfs.h include/linux/
          cp ../susfs/fs/susfs.c fs/

      - name: Patch Kernel (Manual Hooks)
        run: |
          cd common
          # Patching fs/read_write.c for ReSukiSU
          sed -i '/vfs_read(struct file/i #ifdef CONFIG_KSU\nextern int ksu_handle_vfs_read(struct file *file, char __user *buf, size_t count, loff_t *pos);\n#endif' fs/read_write.c
          
          # Patching fs/open.c for SUSFS
          sed -i '/static long do_faccessat/i #ifdef CONFIG_SUSFS\nextern int susfs_handle_faccessat(int dfd, const char __user *filename, int mode, int flags);\n#endif' fs/open.c

      - name: Configure GKI Defconfig
        run: |
          cd common
          # Injecting ReSukiSU and SUSFS configs into GKI defconfig
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_SUSFS=y" >> arch/arm64/configs/gki_defconfig

      - name: Build Kernel Image
        run: |
          cd common
          # Build using the official LLVM/Clang toolchain
          make ARCH=arm64 O=out vendor/gki_defconfig
          make ARCH=arm64 O=out CROSS_COMPILE=aarch64-linux-android- LLVM=1 -j$(nproc)

      - name: Create AnyKernel3 Package
        run: |
          git clone https://github.com/osm0sis/AnyKernel3
          # Copy the generated Image to AnyKernel3
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          # Configure for Tecno Pova 6 Pro (LI9)
          sed -i 's/device.name1=.*/device.name1=LI9/g' anykernel.sh
          sed -i 's/block=.*/block=\/dev\/block\/by-name\/boot;/g' anykernel.sh
          zip -r ../ReSukiSU_GKI_6.6_LI9.zip *

      - name: Upload Finished Kernel
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-LI9-Final
          path: ReSukiSU_GKI_6.6_LI9.zip
