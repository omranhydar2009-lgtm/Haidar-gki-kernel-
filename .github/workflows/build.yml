name: Upload AMD Driver to Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Driver File
        run: |
          URL="https://drivers.amd.com/drivers/prographics/amd-software-pro-edition-25.q4-win11-vega-polaris.exe"
          wget --user-agent="Mozilla/5.0" -O amd-driver.exe "$URL"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v25.Q4-Driver
          name: "AMD Software Pro Edition 25.Q4"
          body: "Automated upload of AMD Vega/Polaris Driver."
          draft: false
          prerelease: false
          files: amd-driver.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
