name: 🚀 Phase-6-Direct-Kleaf-Fixed
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Free Disk Space"
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: "👨‍🔧 Setup Build Environment"
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libncurses5-dev x11proto-core-dev libxml2-utils xsltproc unzip python3 bc llvm lld clang lz4 repo
          curl https://raw.githubusercontent.com/akhilnarang/scripts/master/setup/android_build_env.sh | bash -

      - name: "⏳ Direct Clone & Essential Tools"
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          git clone --depth=1 https://android.googlesource.com/kernel/common -b android15-6.6-2025-02_r1 common
          git clone --depth=1 https://android.googlesource.com/kernel/build
          git clone --depth=1 https://android.googlesource.com/kernel/prebuilts/build-tools prebuilts/build-tools
          git clone --depth=1 https://android.googlesource.com/kernel/prebuilts/bazel/linux-x86_64 prebuilts/bazel/linux-x86_64
          chmod +x build/bazel.sh
          ln -s build/bazel.sh bazel

      - name: "🔨 Build with Bazel"
        working-directory: kernel_workspace
        run: |
          ./bazel build --config=fast //common:kernel_aarch64_dist

      - name: "📦 Export Image"
        run: |
          mkdir -p output
          find kernel_workspace/out/ -name Image -exec cp {} ./output/Image \;
          if [ ! -f ./output/Image ]; then
             find kernel_workspace/ -name Image -exec cp {} ./output/Image \;
          fi

      - name: "📤 Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: GKI-6.6.66-Kleaf-Fixed
          path: output/Image
