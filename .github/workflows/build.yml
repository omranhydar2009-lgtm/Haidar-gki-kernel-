name: MediaFire Python Bot Bypass
on: 
  workflow_dispatch:

jobs:
  extract_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MediaFire Downloader
        run: |
          pip install mediafire-dl

      - name: Download using Bot
        run: |
          mediafire-dl "https://www.mediafire.com/file/asll6cafzoyn3kp/All+Bosses+Abilities+by+Nintendo+OG.zip/file" -o game.zip

      - name: Check and Unzip
        run: |
          ls -lh game.zip
          FILE_SIZE=$(stat -c%s game.zip)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "Error: Download failed or blocked."
            exit 1
          fi
          mkdir -p extracted
          unzip -o game.zip -d extracted

      - name: Find and Rename APK
        run: |
          APK_PATH=$(find extracted -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK found."
            exit 1
          fi
          mv "$APK_PATH" ./final_game.apk

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Shadow-Fight-2-APK
          path: final_game.apk
