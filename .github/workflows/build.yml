name: 🌀 Phase-2-AOSPA-Method
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libncurses5-dev x11proto-core-dev libxml2-utils xsltproc unzip python3 bc llvm lld clang lz4 repo
          curl https://raw.githubusercontent.com/akhilnarang/scripts/master/setup/android_build_env.sh | bash -

      - name: Sync Source (AOSPA Way)
        run: |
          repo init -u https://github.com/AOSPA/android_kernel_manifest -b u-6.6 --depth=1
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle

      - name: Build GKI
        run: |
          tools/bazel build --config=fast //common:kernel_aarch64_dist

      - name: Extract Image
        run: |
          mkdir -p output
          if [ -d "out/android15-6.6/dist" ]; then
            cp out/android15-6.6/dist/Image ./output/Image
          else
            find out/ -name Image -exec cp {} ./output/Image \;
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GKI-AOSPA-Method
          path: output/Image
