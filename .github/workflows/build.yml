name: 🏗️ GKI-A15-6.6-Unified-Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Free Disk Space"
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: "👨‍🔧 Install Environment Dependencies"
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libncurses5-dev x11proto-core-dev libxml2-utils xsltproc unzip python3 bc llvm lld clang lz4 repo
          curl https://raw.githubusercontent.com/akhilnarang/scripts/master/setup/android_build_env.sh | bash -

      - name: "⏳ Sync Kernel Source"
        run: |
          repo init -u https://android.googlesource.com/kernel/manifest -b android15-6.6 --depth=1
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: "🛡️ Integrate KernelSU"
        run: |
          cd common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          cd ..

      - name: "🔨 Build with Bazel (Kleaf)"
        run: |
          tools/bazel build --config=fast //common:kernel_aarch64_dist

      - name: "📦 Extract & Verify Image"
        run: |
          mkdir -p output
          if [ -d "out/android15-6.6/dist" ]; then
            cp out/android15-6.6/dist/Image ./output/Image
          else
            find out/ -name Image -exec cp {} ./output/Image \;
          fi

      - name: "📤 Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: GKI-Kernel-A15-KSU
          path: output/Image
