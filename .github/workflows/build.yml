name: 🚀 Phase-6-Direct-Kleaf-Build-No-Size-Check
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Free Disk Space"
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: "👨‍🔧 Setup Build Environment"
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libncurses5-dev x11proto-core-dev libxml2-utils xsltproc unzip python3 bc llvm lld clang lz4 repo
          curl https://raw.githubusercontent.com/akhilnarang/scripts/master/setup/android_build_env.sh | bash -

      - name: "⏳ Direct Clone & Tools"
        run: |
          git clone --depth=1 https://android.googlesource.com/kernel/common -b android15-6.6-2025-02_r1 kernel
          cd kernel
          git clone --depth=1 https://android.googlesource.com/kernel/build build
          git clone --depth=1 https://android.googlesource.com/kernel/prebuilts/build-tools prebuilts/build-tools
          chmod +x tools/bazel || true

      - name: "🔨 Build with Bazel (Unified Image)"
        working-directory: kernel
        run: |
          ./tools/bazel build --config=fast //common:kernel_aarch64_dist

      - name: "📦 Export Image"
        run: |
          mkdir -p output
          find kernel/out/ -name Image -exec cp {} ./output/Image \;
          
          if [ ! -f ./output/Image ]; then
             find kernel/ -name Image -exec cp {} ./output/Image \;
          fi

      - name: "📤 Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: GKI-6.6.66-Direct-NoCheck
          path: output/Image
