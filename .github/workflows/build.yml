name: Build-KernelSU-AOSP-Strict
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Clone Official AOSP Source
        run: |
          git clone --depth 1 -b android15-6.6-2025-02_r1 https://android.googlesource.com/kernel/common kernel_source
          
      - name: Install Build Tools
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libncurses5-dev x11proto-core-dev libxml2-utils xsltproc unzip python3 bc llvm lld clang

      - name: Setup Google Clang
        run: |
          mkdir clang
          cd clang
          curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz
          tar -xf clang-r522817.tar.gz
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Integrate KernelSU
        run: |
          cd kernel_source
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: Enable KernelSU Configs
        run: |
          cd kernel_source
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_DEBUG=n" >> arch/arm64/configs/gki_defconfig

      - name: Build GKI Kernel
        run: |
          cd kernel_source
          make ARCH=arm64 O=out LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- gki_defconfig
          make ARCH=arm64 O=out LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- -j$(nproc)

      - name: Locate and Prepare Image
        run: |
          find kernel_source/out/ -name Image -exec cp {} ./Image-AOSP-Final \;

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-AOSP-6.6.66-Strict
          path: ./Image-AOSP-Final
