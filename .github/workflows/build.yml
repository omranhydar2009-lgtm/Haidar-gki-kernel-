name: Final Try - MediaFire Fix
on: 
  workflow_dispatch:

jobs:
  extract_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download File
        run: |
          wget --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               --header="Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
               --header="Connection: keep-alive" \
               --header="Referer: https://www.mediafire.com/" \
               "https://download2388.mediafire.com/txdym5m5blsgWuFAJLMzoW2mc00LD6VMfwRb9ilNkng_P7kpPOcPEY1uOTNLtMSYYIlZWqjtuhxONTdvLkhkKwaXDX9XHgC1oTA_tafAjjDD8dPigv80sEJC7bMQzHLQJCvsULdU0au9joWwBLPRTdZl0afJyM0Y5fO4PSfsfSOy1w/asll6cafzoyn3kp/All+Bosses+Abilities+by+Nintendo+OG.zip" \
               -O game.zip

      - name: Verify and Extract
        run: |
          ls -lh game.zip
          FILE_SIZE=$(stat -c%s game.zip)
          if [ "$FILE_SIZE" -lt 102400 ]; then
            echo "MediaFire blocked the download again."
            exit 1
          fi
          mkdir -p extracted
          unzip -o game.zip -d extracted

      - name: Find and Rename APK
        run: |
          APK_PATH=$(find extracted -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found."
            exit 1
          fi
          mv "$APK_PATH" ./final_game.apk

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Extracted-APK
          path: final_game.apk
