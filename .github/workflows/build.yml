name: 🚀 Phase-4-Official-GKI-Mirror
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "🧹 Free Disk Space"
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: "👨‍🔧 Setup Build Environment"
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libncurses5-dev x11proto-core-dev libxml2-utils xsltproc unzip python3 bc llvm lld clang lz4 repo
          curl https://raw.githubusercontent.com/akhilnarang/scripts/master/setup/android_build_env.sh | bash -

      - name: "⏳ Sync Source (Public Mirror)"
        run: |
          mkdir kernel && cd kernel
          # استخدام مرآة (Mirror) عامة لا تتطلب صلاحيات
          repo init -u https://github.com/kernel-build-action/kernel_manifest.git -b common-android15-6.6 --depth=1
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags
          
          chmod +x tools/bazel || true

      - name: "🔨 Build GKI"
        working-directory: kernel
        run: |
          ./tools/bazel build --config=fast //common:kernel_aarch64_dist

      - name: "📦 Export Image"
        run: |
          mkdir -p output
          find kernel/out/ -name Image -exec cp {} ./output/Image \;
          if [ ! -f ./output/Image ]; then
             echo "Build failed to produce Image"
             exit 1
          fi

      - name: "📤 Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: GKI-Phase4-Method
          path: output/Image
