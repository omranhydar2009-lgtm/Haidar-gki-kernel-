name: 🏗️ PREBUILT_A15-6.6-OFFICIAL
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: "👨‍🔧 Setup build environment"
        run: |
          sudo apt update
          curl https://raw.githubusercontent.com/akhilnarang/scripts/master/setup/android_build_env.sh | bash -

      - name: "⏳ Clone Repo & Sync"
        run: |
          repo init -u https://gitlab.com/xprateek/kernel_manifest -b common-android15-6.6 --depth=1
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune

      - name: "🛠️ Build with Bazel"
        run: |
          tools/bazel build --config=fast //common:kernel_aarch64_dist

      - name: "📦 Extract Image"
        run: |
          mkdir -p output
          cp out/android15-6.6/dist/Image ./output/Image

      - name: "📤 Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: Image-Official-A15
          path: ./output/Image
