name: Modern Psych Engine 1.0.4 Compatibility Scanner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  advanced-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download Mod from GitHub Release
        run: |
          # تحميل الملف المباشر من الـ Release الخاص بمستودعك
          curl -L "https://github.com" -o mod_file.zip
          echo "📥 Download finished successfully!"

      - name: Extract Mod Archive
        run: |
          mkdir -p extracted_content
          unzip -q mod_file.zip -d extracted_content/ || echo "⚠ Notice: Extracted with minor zip warnings."

      - name: Advanced Static Code Analysis
        run: |
          python - <<EOF
          import os
          import json

          scan_path = "extracted_content"
          has_pack_json = False
          is_legacy_0_6 = False
          has_lua_scripts = False
          broken_lua_detected = False
          pack_data = None
          
          # دالات قديمة تسبب كراش فوري في إصدار 1.0.4
          legacy_functions = ["objectPlayAnimation", "luaSpriteMakeGraphic", "initLuaShader"]

          print("=== Starting Modern Structural Scan for Psych Engine 1.0.4 ===")
          
          for root, dirs, files in os.walk(scan_path):
              # 1. التحقق من ملف التكوين الحديث
              if "pack.json" in files:
                  has_pack_json = True
                  try:
                      with open(os.path.join(root, "pack.json"), 'r', encoding='utf-8', errors='ignore') as f:
                          pack_data = json.load(f)
                  except:
                      pass
              
              # 2. فحص الأكواد البرمجية (Lua Script Analysis)
              for file in files:
                  if file.endswith(".lua"):
                      has_lua_scripts = True
                      try:
                          with open(os.path.join(root, file), 'r', encoding='utf-8', errors='ignore') as f:
                              content = f.read()
                              # البحث عن دالات قديمة غير مدعومة في 1.0.4
                              for func in legacy_functions:
                                  if func in content:
                                      broken_lua_detected = True
                                      print(f"[⚠] Warning: Outdated function '{func}' found in script: {file}")
                      except:
                          pass

              # 3. التحقق من البنية الكلاسيكية القديمة
              if "assets" in dirs and not has_pack_json:
                  is_legacy_0_6 = True

          print("\n=== Final Compatibility Report ===")
          
          if has_pack_json:
              print("✅ Status: Fully Compatible Structure!")
              if pack_data:
                  print(f"📦 Mod Meta Name: {pack_data.get('name', 'Unknown')}")
                  print(f"📝 Description: {pack_data.get('description', 'None')}")
              
              if broken_lua_detected:
                  print("⚠ Notice: The structural layout is correct (1.0.4), but some inner Lua files use older API methods. It will load, but some visual scripts might skip.")
              else:
                  print("✨ Performance Note: Lua API looks fully modernized for V1.0+ Engine benchmarks.")
                  
          elif is_legacy_0_6:
              print("❌ Status: INCOMPATIBLE (Legacy 0.6.3 structure detected)!")
              print("👉 This archive outputs directly into 'assets'. Running it on 1.0.4 will cause a crash.")
          else:
              print("❓ Status: Unrecognized or Raw Asset Folder.")
              print("👉 It doesn't contain a modern pack structure. Might be a simple drag-and-drop song pack.")
          
          EOF
