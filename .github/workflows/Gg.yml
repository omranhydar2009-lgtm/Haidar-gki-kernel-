name: Check Mod and Sync Pack JSON

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Download Mod from Mediafire
        run: |
          python -c "
          import requests
          target_url = 'https://download2292.mediafire.com/3qhumn551ukgSxkt-HmVsPFdQAMbyhENabDcSF8GOej23aG9JqCfCmgQQJdHZo601vDdEjyz6XaXVxaKtj7P8n9pRlAE8nuenuId-IpkxZ0yGGFZ_ZGD6C7lSPrUtGwpPKc5B94lwhAy5t0hYRreL131giEaZJaUWQOs4K-M1Q/qzyiz6iujxmv22p/VS+Imposter+V4+OPT.zip'
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8',
              'Accept-Language': 'en-US,en;q=0.9',
              'Connection': 'keep-alive'
          }
          session = requests.Session()
          print('Starting download with session tracking...')
          with session.get(target_url, stream=True, headers=headers) as r:
              r.raise_for_status()
              with open('VS_Imposter_V4_OPT.zip', 'wb') as f:
                  for chunk in r.iter_content(chunk_size=8192):
                      f.write(chunk)
          print('Download completed successfully!')
          "

      - name: Verify Downloaded File
        run: |
          if [ ! -f "VS_Imposter_V4_OPT.zip" ]; then
            echo "File not found! Download failed."
            exit 1
          fi
          FILE_SIZE=$(stat -c%s "VS_Imposter_V4_OPT.zip")
          echo "File size: $FILE_SIZE bytes"
          if [ $FILE_SIZE -lt 100000 ]; then
            echo "File size too small, captcha trigger or expired link detected."
            exit 1
          fi

      - name: Extract and Run Compatibility Scanner
        run: |
          mkdir extracted_mod
          unzip -q VS_Imposter_V4_OPT.zip -d extracted_mod/ || echo "Warning: Extracted with issues"
          
          python - <<EOF
          import os
          import json
          import shutil

          mod_path = "extracted_mod"
          has_pack_json = False
          is_legacy = False
          pack_data = None
          found_pack_path = None
          target_dir = mod_path

          print("--- Scanning for Psych Engine 1.0.4 Compatibility ---")
          
          for root, dirs, files in os.walk(mod_path):
              if "pack.json" in files:
                  has_pack_json = True
                  found_pack_path = os.path.join(root, "pack.json")
                  try:
                      with open(found_pack_path, 'r', encoding='utf-8', errors='ignore') as f:
                          pack_data = json.load(f)
                  except Exception as e:
                      print(f"[⚠] Found pack.json but failed to read: {e}")
                  break
              if "songs" in dirs or "characters" in dirs or "data" in dirs:
                  target_dir = root

          print("\n--- Final Scan Results ---")
          if has_pack_json:
              print("✅ Mod is fully compatible! pack.json already exists.")
              if pack_data:
                  print(f"Mod Name: {pack_data.get('name', 'Undefined')}")
              shutil.copy(found_pack_path, "./pack.json")
          else:
              print("❌ Warning: This mod does not have a pack.json (Legacy structure or raw song folder).")
              print("👉 Automatically creating a compatible pack.json for version 1.0.4...")
              pack_content = {
                  "name": "Vs Impostor V4 - Optimized Pack",
                  "description": "Optimized for Low-End PCs (4GB RAM) and compatible with Psych Engine 1.0.4",
                  "restart": True
              }
              with open("./pack.json", "w", encoding="utf-8") as f:
                  json.dump(pack_content, f, indent=4, ensure_ascii=False)
              print("✅ Created new pack.json successfully.")
          
          EOF

      - name: Commit and Push pack.json to Repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pack.json
          git commit -m "Sync verified pack.json from Psych Engine Mod Scan" || echo "No changes to commit"
          git push
