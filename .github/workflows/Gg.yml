name: List Game Files and Export to TXT

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Psych Engine 1.0.4
        run: |
          curl -L -o game.zip "https://github.com/ShadowMario/FNF-PsychEngine/releases/download/1.0.4/PsychEngine-Windows64.zip"

      - name: Extract Game
        run: |
          powershell Expand-Archive -Path game.zip -DestinationPath game_folder

      - name: Generate Directory Tree and Save to TXT
        run: |
          cd game_folder
          echo "=== FNF PSYCH ENGINE 1.0.4 DIRECTORY STRUCTURE ===" > ../game_structure.txt
          echo "Generated on: $(Get-Date)" >> ../game_structure.txt
          echo "------------------------------------------------" >> ../game_structure.txt
          Get-ChildItem -Recurse | Select-Object FullName, Length | Format-Table -AutoSize >> ../game_structure.txt

      - name: Create Release with Structure TXT
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.4-inspection
          name: "Psych Engine 1.0.4 Structure Inspection"
          body: "Psych Engine 1.0.4 File Structure"
          draft: false
          prerelease: false
          files: game_structure.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
