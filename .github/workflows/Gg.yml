name: Build and Package Psych Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Current Repository
      uses: actions/checkout@v4

    # الخطة الجديدة: جلب ملفات اللعبة مباشرة من مستودعها الأصلي
    - name: Clone Psych Engine Source
      run: |
        # استبدل الرابط أدناه برابط مستودع اللعبة الصحيح الخاص بك
        git clone --depth 1 https://github.com/omranhydar2009-lgtm/PsychEngine.git game_project
        # ملاحظة: إذا كان المستودع الخاص باللعبة هو نفسه Haidar-gki-kernel- ولكن على فرع آخر (مثلاً dev)، استبدل الأمر بـ:
        # git clone --depth 1 -b اسم_الفرع https://github.com/omranhydar2009-lgtm/Haidar-gki-kernel-.git game_project

    - name: Setup Haxe
      uses: krdlab/setup-haxe@v1
      with:
        haxe-version: 4.3.4

    - name: Install Ubuntu Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libalut-dev libasound2-dev libx11-dev libxext-dev libxi-dev libxrandr-dev libxinerama-dev libxcursor-dev libvlc-dev libvlccore-dev

    - name: Install Haxelibs
      run: |
        haxelib setup ~/haxelib
        haxelib install lime
        haxelib install openfl
        haxelib install flixel
        haxelib run lime setup

    - name: Compile Game
      run: |
        cd game_project
        haxelib run lime build linux -release

    - name: Zip Psych Engine Release
      run: |
        if [ -d "game_project/export/release/linux/bin" ]; then
          cd game_project/export/release/linux/bin
        else
          cd game_project
        fi
        zip -r "$GITHUB_WORKSPACE/psych-engine-release.zip" ./*

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PsychEngine-Linux-Build
        path: psych-engine-release.zip
