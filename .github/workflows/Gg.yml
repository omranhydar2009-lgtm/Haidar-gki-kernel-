name: Pack and Release Psych Engine

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Current Date
        id: date
        run: echo "BUILD_DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Zip Psych Engine Folder
        run: |
          zip -r psych-engine-release.zip . -x "*.git*" "*/.github*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: psych-engine-build-${{ env.BUILD_DATE }}
          path: psych-engine-release.zip
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.4-build-${{ env.BUILD_DATE }}
          name: Psych Engine v1.0.4 (Build ${{ env.BUILD_DATE }})
          body: |
            ## Psych Engine Automated Build
            تم تجميع وضغط ملفات المحرك تلقائياً بواسطة GitHub Actions.
            
            ### محتويات الإصدار:
            * المحرك التنفيذي والمكتبات الأساسية (DLLs).
            * مجلدات الأصول والأغاني والـ Mods كاملة.
            
            *تاريخ البناء: ${{ env.BUILD_DATE }}*
          draft: false
          prerelease: false
          files: psych-engine-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
