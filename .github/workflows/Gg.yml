name: Upload YouTube Morphe Module to Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Download ZIP File
        run: |
          python -c "
          import requests
          target_url = 'https://release-assets.githubusercontent.com/github-production-release-asset/507288931/eb92fee6-9cc7-4753-8ce7-f483bba439e4?sp=r&sv=2018-11-09&sr=b&spr=https&se=2026-07-08T18%3A36%3A36Z&rscd=attachment%3B+filename%3Dyoutube-morphe-module-v20.51.39-all.zip&rsct=application%2Foctet-stream&skoid=96c2d410-5711-43a1-aedd-ab1947aa7ab0&sktid=398a6654-997b-47e9-b12b-9515b896b4de&skt=2026-07-08T17%3A35%3A54Z&ske=2026-07-08T18%3A36%3A36Z&sks=b&skv=2018-11-09&sig=eZpa2z1hH62Zb14xKlUwJTxPEGXrKLkze21mQuXPCFY%3D&jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmVsZWFzZS1hc3NldHMuZ2l0aHVidXNlcmNvbnRlbnQuY29tIiwia2V5Ijoia2V5MSIsImV4cCI6MTc4MzUzNjY3OSwibmJmIjoxNzgzNTMzMDc5LCJwYXRoIjoicmVsZWFzZWFzc2V0cHJvZHVjdGlvbi5ibG9iLmNvcmUud2luZG93cy5uZXQifQ.aIfCCI2rheImopphZZB9EjM46yvef5Q_Pf3DGLit93s&response-content-disposition=attachment%3B%20filename%3Dyoutube-morphe-module-v20.51.39-all.zip&response-content-type=application%2Foctet-stream'
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
          }
          with requests.get(target_url, stream=True, headers=headers) as r:
              r.raise_for_status()
              with open('youtube-morphe-module-v20.51.39-all.zip', 'wb') as f:
                  for chunk in r.iter_content(chunk_size=8192):
                      f.write(chunk)
          "

      - name: Verify Size
        run: |
          FILE_SIZE=$(stat -c%s "youtube-morphe-module-v20.51.39-all.zip")
          if [ $FILE_SIZE -lt 10000 ]; then
            echo "File size too small, download might have failed."
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v20.51.39
          name: "YouTube Morphe Module v20.51.39"
          body: "Automated upload of YouTube Morphe Module ZIP."
          draft: false
          prerelease: false
          files: youtube-morphe-module-v20.51.39-all.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
