name: Fetch Mod and Sync directly to Repository

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Smart Download from Mediafire
        run: |
          python -c "
          import requests
          # استخدام الرابط المحدث الذي يحتوي على الـ dkey لتفادي الكابتشا والتحميل المباشر
          target_url = 'https://mediafire.com'
          
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              'Accept': '*/*',
              'Connection': 'keep-alive'
          }
          
          print('جاري بدء التحميل الفعلي للمود (1.82 جيجابايت)...')
          session = requests.Session()
          with session.get(target_url, stream=True, headers=headers) as r:
              r.raise_for_status()
              with open('VS_Imposter_V4_OPT.zip', 'wb') as f:
                  for chunk in r.iter_content(chunk_size=32768): # زيادة الـ Chunk لسرعة نقل البيانات
                      f.write(chunk)
          print('اكتمل تحميل الملف بنجاح وبسرعة عالية!')
          "

      - name: Verify and Extract Mod File
        run: |
          if [ ! -f "VS_Imposter_V4_OPT.zip" ]; then
            echo "خطأ: الملف غير موجود."
            exit 1
          fi
          FILE_SIZE=$(stat -c%s "VS_Imposter_V4_OPT.zip")
          echo "حجم الملف المحمل: $FILE_SIZE بايت"
          if [ $FILE_SIZE -lt 100000000 ]; then
            echo "خطأ: حجم الملف صغير جداً، التحميل لم يكتمل بسبب قيود الرابط."
            exit 1
          fi
          mkdir -p current_mod
          unzip -q VS_Imposter_V4_OPT.zip -d current_mod/ || echo "تم فك الضغط مع تحذيرات ثانوية"

      - name: Structure and Inject Pack JSON
        run: |
          python - <<EOF
          import os
          import json

          mod_dir = "current_mod"
          has_pack = False
          target_path = mod_dir

          print("--- فحص بنية المود وحقن ملف التوافق ---")
          for root, dirs, files in os.walk(mod_dir):
              if "pack.json" in files:
                  has_pack = True
                  print("✅ المود يحتوي بالفعل على pack.json وهو جاهز.")
                  break
              if "songs" in dirs or "characters" in dirs or "data" in dirs:
                  target_path = root
                  break

          if not has_pack:
              print("⚠ ملف pack.json مفقود. جاري توليده وتخصيصه لإصدار 1.0.4...")
              pack_content = {
                  "name": "Vs Impostor V4 - Optimized Pack",
                  "description": "Optimized for Low-End PCs (4GB RAM) and compatible with Psych Engine 1.0.4",
                  "restart": True
              }
              with open(os.path.join(target_path, "pack.json"), "w", encoding="utf-8") as f:
                  json.dump(pack_content, f, indent=4, ensure_ascii=False)
              print("✅ تم إنشاء pack.json ودمجه داخل مجلدات المود بنجاح!")
          EOF

      - name: Commit and Push Game Files Directly to Repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # إنشاء مجلد منظم للمودات داخل مستودعك
          mkdir -p mods/Vs_Impostor_V4_Optimized
          cp -r current_mod/* mods/Vs_Impostor_V4_Optimized/
          
          # رفع كافة الملفات والـ Sprites المضغوطة مباشرة إلى الكود
          git add mods/
          git commit -m "Sync complete optimized Among Us mod files with pack.json" || echo "لا توجد تغييرات جديدة لرفعها"
          git push origin main || git push origin master
