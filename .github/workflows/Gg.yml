name: Build and Package Psych Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Haxe
      uses: krdlab/setup-haxe@v1
      with:
        haxe-version: 4.3.4

    - name: Install Ubuntu Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libalut-dev libasound2-dev libx11-dev libxext-dev libxi-dev libxrandr-dev libxinerama-dev libxcursor-dev libvlc-dev libvlccore-dev

    - name: Install Haxelibs
      run: |
        haxelib setup ~/haxelib
        haxelib install lime
        haxelib install openfl
        haxelib install flixel
        haxelib run lime setup

    - name: List Files
      run: |
        echo "=== Current Directory Content ==="
        ls -la
        echo "=== Searching for Project.xml ==="
        find . -name "Project.xml" -o -name "project.xml"

    - name: Compile Game
      run: |
        PROJECT_FILE=$(find . -name "Project.xml" -o -name "project.xml" | head -n 1)
        
        if [ -z "$PROJECT_FILE" ]; then
          echo "ERROR: Project.xml not found! Make sure your game files are in this branch."
          exit 1
        fi
        
        PROJECT_DIR=$(dirname "$PROJECT_FILE")
        echo "Found project in: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        haxelib run lime build linux -release

    - name: Zip Psych Engine Release
      run: |
        PROJECT_FILE=$(find . -name "Project.xml" -o -name "project.xml" | head -n 1)
        if [ -n "$PROJECT_FILE" ]; then
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          if [ -d "$PROJECT_DIR/export/release/linux/bin" ]; then
            cd "$PROJECT_DIR/export/release/linux/bin"
          else
            cd "$PROJECT_DIR"
          fi
          zip -r "$GITHUB_WORKSPACE/psych-engine-release.zip" ./*
        else
          echo "No project to zip."
          exit 1
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PsychEngine-Linux-Build
        path: psych-engine-release.zip
